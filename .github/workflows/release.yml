name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.18.0)"
        required: true

env:
  CARGO_TERM_COLOR: always
  APP_NAME: arai
  APP_DISPLAY_NAME: Arai

jobs:
  release:
    runs-on: macos-latest

    permissions:
      contents: write

    steps:
      - name: Verify maintainer permission
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const username = context.actor;
            const result = await github.rest.repos.getCollaboratorPermissionLevel({
              owner,
              repo,
              username,
            });
            const allowed = new Set(["admin", "maintain"]);
            const permission = result.data.permission;
            core.info(`Actor ${username} has permission: ${permission}`);
            if (!allowed.has(permission)) {
              core.setFailed(
                `Only maintainers or admins may run releases. Actor ${username} has permission: ${permission}`
              );
            }

      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0
          ref: main

      - name: Validate version format
        run: |
          if ! echo "${{ inputs.version }}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid version format. Use semver (e.g. 0.18.0)"
            exit 1
          fi

      - name: Check that release tag does not already exist
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/v${{ inputs.version }}" >/dev/null 2>&1; then
            echo "::error::Tag v${{ inputs.version }} already exists"
            exit 1
          fi

      - name: Update Cargo.toml version
        run: sed -i '' 's/^version = ".*"/version = "${{ inputs.version }}"/' Cargo.toml

      - name: Finalize changelog
        run: |
          DATE=$(date +%Y-%m-%d)
          sed -i '' "s/^## \[Unreleased\]/## [Unreleased]\n\n## [${{ inputs.version }}] - $DATE/" CHANGELOG.md

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install system dependencies
        run: brew install cmake create-dmg

      - name: Install cargo-bundle
        run: cargo install cargo-bundle

      - name: Build ARM64 (Apple Silicon)
        run: cargo build --release --target aarch64-apple-darwin

      - name: Build x86_64 (Intel)
        run: cargo build --release --target x86_64-apple-darwin

      - name: Create universal binary
        run: |
          mkdir -p target/universal-apple-darwin/release
          lipo -create \
            target/aarch64-apple-darwin/release/$APP_NAME \
            target/x86_64-apple-darwin/release/$APP_NAME \
            -output target/universal-apple-darwin/release/$APP_NAME

      - name: Create .app bundle
        run: cargo bundle --release --target aarch64-apple-darwin

      - name: Replace bundle binary with universal binary
        run: |
          APP_BUNDLE="target/aarch64-apple-darwin/release/bundle/osx/${APP_DISPLAY_NAME}.app"
          cp target/universal-apple-darwin/release/$APP_NAME "$APP_BUNDLE/Contents/MacOS/$APP_NAME"

      - name: Code sign .app bundle (ad-hoc)
        run: |
          APP_BUNDLE="target/aarch64-apple-darwin/release/bundle/osx/${APP_DISPLAY_NAME}.app"
          codesign --force --deep --sign - "$APP_BUNDLE"

      - name: Create .dmg installer
        run: |
          VERSION="${{ inputs.version }}"
          APP_BUNDLE="target/aarch64-apple-darwin/release/bundle/osx/${APP_DISPLAY_NAME}.app"
          DMG_PATH="dist/${APP_DISPLAY_NAME}-${VERSION}-macos-universal.dmg"
          mkdir -p dist

          VOLICON_ARGS=()
          if [[ -f assets/images/logo.icns ]]; then
            VOLICON_ARGS=(--volicon assets/images/logo.icns)
          fi

          create-dmg \
            --volname "$APP_DISPLAY_NAME" \
            "${VOLICON_ARGS[@]}" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "${APP_DISPLAY_NAME}.app" 175 190 \
            --app-drop-link 425 190 \
            --no-internet-enable \
            "$DMG_PATH" \
            "$APP_BUNDLE" || true

          hdiutil detach "/Volumes/$APP_DISPLAY_NAME" 2>/dev/null || true

      - name: Create .app zip
        run: |
          VERSION="${{ inputs.version }}"
          APP_BUNDLE="target/aarch64-apple-darwin/release/bundle/osx/${APP_DISPLAY_NAME}.app"
          mkdir -p dist
          cd "$(dirname "$APP_BUNDLE")"
          zip -r "$GITHUB_WORKSPACE/dist/${APP_DISPLAY_NAME}-${VERSION}-macos-universal.app.zip" "${APP_DISPLAY_NAME}.app"

      - name: Create architecture tarballs and zips
        run: |
          VERSION="${{ inputs.version }}"
          mkdir -p dist
          for arch in aarch64 x86_64 universal; do
            BIN="target/${arch}-apple-darwin/release/$APP_NAME"

            tar -czf "dist/${APP_NAME}-${VERSION}-macos-${arch}.tar.gz" \
              -C "$(dirname "$BIN")" "$APP_NAME"

            tar -cf "dist/${APP_NAME}-${VERSION}-macos-${arch}.tar" \
              -C "$(dirname "$BIN")" "$APP_NAME"

            zip -j "dist/${APP_NAME}-${VERSION}-macos-${arch}.zip" "$BIN"
          done

      - name: Generate checksums
        run: |
          cd dist
          shasum -a 256 * > SHA256SUMS.txt

      - name: Commit release metadata to main
        run: |
          git config user.name "mkoltun-bot"
          git config user.email "mkoltun-bot@users.noreply.github.com"
          git add Cargo.toml CHANGELOG.md
          git commit -m "chore: release v${{ inputs.version }}"
          git push origin HEAD:main

      - name: Create and push release tag
        run: |
          git tag "v${{ inputs.version }}"
          git push origin "v${{ inputs.version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          generate_release_notes: true
          files: |
            dist/*.dmg
            dist/*.tar.gz
            dist/*.tar
            dist/*.zip
            dist/SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
