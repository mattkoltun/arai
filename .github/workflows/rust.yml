name: CI

on:
  push:
    branches: [ "main" ]
    tags-ignore:
      - "v*"
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
    - name: Install system dependencies
      run: brew install cmake
    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: cargo test --verbose
    - name: Clippy
      run: cargo clippy --all-targets --all-features -- -D warnings
    - name: Format check
      run: cargo fmt -- --check

  bump-version:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: macos-latest

    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Check if HEAD is already tagged
      id: check_tag
      run: |
        if git describe --exact-match HEAD 2>/dev/null; then
          echo "tagged=true" >> "$GITHUB_OUTPUT"
        else
          echo "tagged=false" >> "$GITHUB_OUTPUT"
        fi

    - uses: dtolnay/rust-toolchain@stable
      if: steps.check_tag.outputs.tagged == 'false'

    - name: Bump patch version
      if: steps.check_tag.outputs.tagged == 'false'
      run: |
        CARGO_TOML="Cargo.toml"
        CURRENT=$(grep '^version' "$CARGO_TOML" | head -1 | sed 's/.*"\(.*\)"/\1/')
        IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
        PATCH=$((PATCH + 1))
        NEW_VERSION="$MAJOR.$MINOR.$PATCH"
        echo "Bumping $CURRENT -> $NEW_VERSION"

        sed -i '' "s/^version = \"$CURRENT\"/version = \"$NEW_VERSION\"/" "$CARGO_TOML"
        cargo check --quiet 2>/dev/null

        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add "$CARGO_TOML" Cargo.lock
        git commit -m "chore: bump version to v$NEW_VERSION"
        git push
